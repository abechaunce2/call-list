<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>St. Francis Call List — Middletown CT</title>
<style>
  :root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--sep:rgba(0,0,0,.10);--blue:#007aff;--green:#34c759;--orange:#ff9500;--teal:#30b0c7;--purple:#af52de;--red:#ff3b30;--fill:#ececf0;--hover:#f4f4f6;--shadow:0 1px 3px rgba(0,0,0,.05)}
  @media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#9b9ba1;--sep:rgba(255,255,255,.12);--fill:#2c2c2e;--hover:#2c2c2e;--shadow:none}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:840px;margin:0 auto}
  header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);padding:10px 18px 0;border-bottom:.5px solid var(--sep)}
  .back{font-size:13px;font-weight:600;color:var(--blue);text-decoration:none;display:inline-block;margin-bottom:2px}
  h1{margin:0;font-size:25px;font-weight:800;letter-spacing:-.03em}
  .sub{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.45}
  .score{display:flex;gap:8px;margin-top:11px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .score::-webkit-scrollbar{display:none}
  .pip{flex:0 0 auto;background:var(--fill);border-radius:12px;padding:7px 13px;min-width:74px}
  .pip b{font-size:17px;font-weight:800;letter-spacing:-.01em;display:block;line-height:1.2}
  .pip .lbl{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;white-space:nowrap}
  .pip.goal{background:color-mix(in srgb,var(--blue) 12%,var(--fill))}
  .pip.goal.hit{background:color-mix(in srgb,var(--green) 18%,var(--fill))}
  .pip.goal.hit b{color:var(--green)}
  .progress{height:6px;background:var(--fill);border-radius:99px;overflow:hidden;margin:10px 0 0}
  .progress > i{display:block;height:100%;width:0;background:var(--blue);border-radius:99px;transition:width .3s}
  .progress > i.hit{background:var(--green)}
  .ptxt{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:600;margin:4px 0 0}
  .controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px}
  #q{flex:1;min-width:140px;background:var(--fill);border:none;color:var(--text);padding:9px 12px;border-radius:11px;font-size:16px;outline:none}
  select,.btn{background:var(--fill);border:none;color:var(--text);padding:9px 11px;border-radius:11px;font-size:13px;cursor:pointer;font-weight:600}
  .btn.on{background:var(--blue);color:#fff}
  .chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin:9px -18px 0;padding:0 18px 11px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--fill);border:none;color:var(--text);padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .chip small{color:var(--muted);font-weight:700;margin-left:4px}
  .chip.on{background:var(--text);color:var(--bg)}
  .chip.on small{color:var(--bg);opacity:.65}
  main{padding:6px 14px 110px}
  .sec{margin:18px 0 0}
  .lab{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:0 6px 8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .lab .arr{font-size:11px;margin-right:6px}
  .lab .n{font-weight:700}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:.5px solid var(--sep)}
  .row{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;position:relative;min-height:52px}
  .row::after{content:"";position:absolute;left:52px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .row:last-of-type::after{display:none}
  .row:hover{background:var(--hover)}
  .row.done{opacity:.5}
  .row.done .nm{text-decoration:line-through}
  .cb{flex:0 0 auto;width:25px;height:25px;border-radius:8px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;background:transparent}
  .cb b{opacity:0}
  .row.done .cb{background:var(--green);border-color:var(--green)}
  .row.done .cb b{opacity:1}
  .mid{flex:1 1 auto;min-width:0}
  .nm{font-size:15.5px;font-weight:650;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:1.5px 8px;border-radius:99px;margin-left:6px;color:#fff;vertical-align:middle}
  .tier{display:inline-block;font-size:11px;font-weight:600;padding:0 7px;border-radius:99px;margin-left:6px;background:var(--fill);color:var(--muted)}
  .notepv{font-size:12.5px;color:var(--text);opacity:.7;margin-top:3px;line-height:1.35;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cp{flex:0 0 auto;background:var(--blue);color:#fff;border:none;padding:8px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer}
  .cp.ok{background:var(--green)}
  .chev{flex:0 0 auto;color:var(--muted);font-size:14px;width:12px;text-align:center;transition:transform .15s}
  .row.open .chev{transform:rotate(90deg)}
  .detail{display:none;padding:4px 15px 16px 52px;background:var(--card);border-top:.5px solid var(--sep)}
  .row.open + .detail{display:block}
  .stat{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
  .sbtn{border:none;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:650;cursor:pointer;background:var(--fill);color:var(--text);flex:1 0 auto;min-width:88px;text-align:center}
  .sbtn.sel{color:#fff}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
  .dgrid .full{grid-column:1/-1}
  .fld label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;display:block;margin:0 0 3px 2px}
  .fld input,.fld textarea{width:100%;background:var(--fill);border:none;color:var(--text);padding:9px 11px;border-radius:10px;font-size:15px;outline:none;font-family:inherit}
  .fld textarea{resize:vertical;min-height:46px}
  .cbk{border:1px solid var(--orange);border-radius:12px;padding:9px 11px;margin-top:10px;background:color-mix(in srgb,var(--orange) 9%,transparent)}
  .cbk .hd{font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
  .links{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap}
  .links a{font-size:13px;font-weight:650;color:var(--blue);text-decoration:none;background:var(--fill);padding:8px 13px;border-radius:10px}
  .lastc{font-size:11.5px;color:var(--muted);margin-top:9px}
  .due{margin:14px 0 0;border-radius:16px;overflow:hidden;border:1px solid var(--orange);background:color-mix(in srgb,var(--orange) 8%,transparent)}
  .due .dh{font-size:12.5px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;padding:11px 15px 6px}
  .due .drow{display:flex;align-items:center;gap:10px;padding:10px 15px;border-top:.5px solid var(--sep);font-size:14px;cursor:pointer}
  .due .drow .when{margin-left:auto;font-size:12px;font-weight:800;white-space:nowrap}
  .due .drow .when.now{color:var(--red)}
  .help{color:var(--muted);font-size:12.5px;line-height:1.65;margin:30px 6px 0;padding-top:14px;border-top:.5px solid var(--sep)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:rgba(30,30,32,.95);color:#fff;font-weight:650;font-size:14px;padding:12px 18px;border-radius:13px;opacity:0;transition:.2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .saved{position:fixed;right:16px;bottom:26px;background:var(--green);color:#fff;font-weight:750;font-size:12.5px;padding:8px 13px;border-radius:99px;opacity:0;transition:.18s;pointer-events:none;z-index:50}
  .saved.show{opacity:1}
  .saved.err{background:var(--red)}
  /* note quick-chips */
  .nchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .nchip{background:var(--fill);border:none;color:var(--muted);padding:6px 11px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer}
  .nchip:active{background:var(--sep)}
  .nchip.on{background:var(--text);color:var(--bg)}
  .tpick .nchips{margin-top:6px}
  .tpick .nchip.tch{background:var(--card);border:.5px solid var(--sep);color:var(--text);font-weight:650;min-width:46px}
  .dial .tpick .nchip.tch{background:var(--fill);border:none}
  /* dial mode */
  .dial{position:fixed;inset:0;z-index:70;background:var(--bg);display:none;overflow:auto;padding:14px 16px calc(24px + env(safe-area-inset-bottom))}
  .dial.show{display:block}
  .dtop{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;color:var(--muted);font-weight:600;max-width:560px;margin:0 auto;flex-wrap:wrap}
  .dleft{white-space:nowrap}
  .dx,.dskip{background:var(--fill);border:none;color:var(--text);padding:9px 13px;border-radius:11px;font-size:13px;font-weight:650;cursor:pointer}
  .dcard{max-width:560px;margin:7vh auto 0;text-align:center}
  .dcat{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .dnm{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1.15}
  .dmeta{color:var(--muted);font-size:14px;margin-top:4px}
  .dnum{display:block;margin:22px auto 0;background:var(--blue);color:#fff;border:none;font-size:24px;font-weight:800;padding:16px 26px;border-radius:18px;cursor:pointer;font-variant-numeric:tabular-nums}
  .dnum:active{transform:scale(.97)}
  .dhint{font-size:11.5px;color:var(--muted);margin-top:7px}
  .dstat{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:20px}
  .dchips{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .dnotes{width:100%;max-width:560px;margin:14px auto 0;background:var(--fill);border:none;color:var(--text);padding:11px 12px;border-radius:12px;font-size:15px;min-height:56px;font-family:inherit;outline:none;display:block}
  .dempty{margin-top:28vh;text-align:center;color:var(--muted);font-size:16px;line-height:1.6}
  /* pitch sheet */
  .scrim{position:fixed;inset:0;z-index:74;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:.25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:75;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.25);max-height:82vh;overflow:auto;padding:8px 20px calc(26px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
  .sheet.show{transform:none}
  .grab{width:36px;height:5px;border-radius:99px;background:var(--sep);margin:6px auto 12px}
  .sheet h3{margin:15px 0 5px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .sheet p{margin:0;font-size:14.5px;line-height:1.55}
  .sheet .warn{color:var(--red);font-weight:600}
  /* scratch pad */
  .pad{position:fixed;top:0;right:0;bottom:0;width:min(440px,92vw);z-index:65;background:var(--card);border-left:.5px solid var(--sep);box-shadow:-10px 0 34px rgba(0,0,0,.14);transform:translateX(105%);transition:transform .25s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;padding:14px 16px calc(16px + env(safe-area-inset-bottom))}
  .pad.show{transform:none}
  .padhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
  .padhd b{font-size:16px;font-weight:750}
  .pad .sub2{color:var(--muted);font-size:12px;margin:2px 0 10px}
  .ptabs{display:flex;gap:6px;margin:8px 0 10px}
  .ptab{flex:1;background:var(--fill);border:none;color:var(--muted);padding:8px 10px;border-radius:10px;font-size:13px;font-weight:650;cursor:pointer}
  .ptab.on{background:var(--text);color:var(--bg)}
  .pbody{flex:1;overflow:auto;display:flex;flex-direction:column;gap:9px;padding-bottom:6px}
  .pbody textarea.paper{flex:1;min-height:300px;background:var(--fill);border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:15px;line-height:1.6;color:var(--text);outline:none;resize:none}
  .pcard{background:var(--fill);border-radius:12px;padding:11px 12px;flex:0 0 auto}
  .pcard.over{border:1px solid var(--red);background:color-mix(in srgb,var(--red) 7%,var(--fill))}
  .pchd .pcnm{font-size:14.5px;font-weight:700}
  .pchd .pcmeta{font-size:12px;color:var(--muted);margin-top:2px}
  .pcdm{font-size:12.5px;margin-top:5px;font-weight:600}
  .pctime{font-size:12.5px;color:var(--orange);font-weight:700;margin-top:5px}
  .pctime.over{color:var(--red)}
  .pcprev{font-size:12.5px;color:var(--muted);margin-top:5px;white-space:pre-wrap}
  .pcnote{width:100%;margin-top:8px;background:var(--card);border:.5px solid var(--sep);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:14px;color:var(--text);outline:none;min-height:44px;resize:vertical}
  .pcact{display:flex;gap:7px;margin-top:9px}
  .taskform{display:flex;gap:6px;flex-wrap:wrap;flex:0 0 auto}
  .taskform input[type=text]{flex:1;min-width:120px;background:var(--fill);border:none;color:var(--text);padding:9px 11px;border-radius:10px;font-size:14px;outline:none}
  #padbadge{display:none;background:var(--red);color:#fff;font-size:11px;font-weight:800;min-width:17px;height:17px;border-radius:99px;align-items:center;justify-content:center;padding:0 4px;margin-left:5px;vertical-align:middle}
  /* confetti */
  .cfx{position:fixed;top:18%;width:9px;height:14px;z-index:80;border-radius:2px;pointer-events:none;animation:cfall 1.4s ease-in forwards}
  @keyframes cfall{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--dx),70vh) rotate(540deg)}}
  @media print{header{position:static;background:#fff;backdrop-filter:none}.controls,.chips,.progress,.ptxt,.cp,.toast,.saved,.chev,.links,.back,.help,.dial,.sheet,.scrim{display:none!important}body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ccc}.row{break-inside:avoid}.meta{color:#444}}
</style>
</head>

</header>
<main id="app"></main>

    b.addEventListener('click',()=>{chipCat=(chipCat===val)?'':val;buildChips();build();});
    chipsEl.appendChild(b);
  };
  mk('All','',LEADS.length);

}

function dueBanner(){
  const items=LEADS.filter(l=>get(l.dig).time).map(l=>({l,t:new Date(get(l.dig).time)})).filter(x=>!isNaN(x.t)).sort((a,b)=>a.t-b.t);

  const now=Date.now();
  const wrap=document.createElement('div');wrap.className='due';
  wrap.innerHTML='<div class="dh">↩ Callbacks ('+items.length+')</div>';
  items.forEach(({l,t})=>{

    dr.innerHTML='<b>'+esc(l.n)+'</b>'+(r.dm?' <span style="color:var(--muted);font-weight:500">— '+esc(r.dm)+'</span>':'')+'<span class="when'+(over?' now':'')+'">'+(over?'DUE · ':'')+shortWhen(r.time)+'</span>';

// ================= SCOREBOARD =================
function updateScore(){
  let done=0,today=0,inprog=0,won=0,cbs=0;
  LEADS.forEach(l=>{const r=STATE[l.dig];if(!r)return;if(r.status)done++;if(isToday(r.ts))today++;if(r.status==='inprogress')inprog++;if(r.status==='won')won++;if(r.time)cbs++;});
  const hit=today>=GOAL;
  scoreEl.innerHTML=
    '<div class="pip goal'+(hit?' hit':'')+'"><b>'+today+' / '+GOAL+'</b><span class="lbl">calls today</span></div>'+
    '<div class="pip"><b style="color:var(--teal)">'+inprog+'</b><span class="lbl">in progress</span></div>'+
    '<div class="pip"><b style="color:var(--orange)">'+cbs+'</b><span class="lbl">callbacks</span></div>'+
    '<div class="pip"><b style="color:var(--green)">'+won+'</b><span class="lbl">won</span></div>'+
    '<div class="pip"><b>'+done+'</b><span class="lbl">crossed off</span></div>';
  const pct=Math.min(100,Math.round(today/GOAL*100));
  bar.style.width=pct+'%';bar.classList.toggle('hit',hit);
  document.getElementById('goaltxt').textContent=hit?'🎯 Daily goal hit — keep rolling':'Today’s dial goal: '+today+' of '+GOAL;
  document.getElementById('donetxt').textContent=done+' / '+LEADS.length+' crossed off';
  updatePadBadge();
}

// ================= RENDER =================
function build(){
  app.innerHTML='';const term=q.value.trim().toLowerCase();
  updateScore();
  if(cbView){
    const b=dueBanner();
    app.appendChild(b||Object.assign(document.createElement('div'),{style:'color:var(--muted);text-align:center;padding:40px',textContent:'No callbacks set yet. Set a "Call back at" time on a lead.'}));
    return;
  }
  const due=dueBanner();if(due)app.appendChild(due);
  const match=l=>{const r=STATE[l.dig];if(hideDone&&r&&r.status)return false;if(nearOnly&&l.tier!==1)return false;if(chipCat&&l.c!==chipCat)return false;if(!term)return true;return (l.n+' '+l.c+' '+l.t).toLowerCase().includes(term);};
  if(sortMode==='dist'){
    const rows=LEADS.filter(match).slice().sort((a,b)=>a.mi-b.mi);
    if(!rows.length){app.appendChild(noMatch());return;}
    const card=document.createElement('div');card.className='card';
    rows.forEach(l=>{card.appendChild(rowEl(l,true));card.appendChild(detailEl(l));});
    const sec=document.createElement('div');sec.className='sec';sec.appendChild(card);app.appendChild(sec);
  } else {
    let any=false;
    CATS.forEach(cat=>{
      const rows=LEADS.filter(l=>l.c===cat).filter(match);
      if(!rows.length)return;any=true;
      const folded=!!FOLD[cat];
      const sec=document.createElement('div');sec.className='sec';
      const lab=document.createElement('div');lab.className='lab';
      lab.innerHTML='<span><span class="arr">'+(folded?'▸':'▾')+'</span>'+esc(cat)+'</span><span class="n">'+rows.length+'</span>';
      lab.addEventListener('click',()=>{FOLD[cat]=!FOLD[cat];build();});
      sec.appendChild(lab);
      if(!folded){
        const card=document.createElement('div');card.className='card';
        rows.forEach(l=>{card.appendChild(rowEl(l,false));card.appendChild(detailEl(l));});
        sec.appendChild(card);
      }
      app.appendChild(sec);
    });
    if(!any)app.appendChild(noMatch());
  }
  const help=document.createElement('div');help.className='help';
  help.innerHTML='<b>How this sheet works:</b> Tap a business to open it — set a status, write what happened, set a callback time. Tap the circle to quick-cross-off. <b>Copy</b> puts the number on your clipboard for the Salesforce dialer, counts the dial, and marks the lead “Called” until you set the real result. Everything saves automatically in this browser, only for this church. Category pills up top filter the list; tap a section title to fold it.';
  const recCount=LEADS.filter(l=>{const r=STATE[l.dig];return r&&(r.status||r.notes||r.time||r.dm||r.email||r.ts);}).length;
  let lastex='never';try{const v=localStorage.getItem('lastexport_'+LIST_ID);if(v)lastex=new Date(parseInt(v,10)).toLocaleString();}catch(e){}
  const dhh=document.createElement('div');dhh.style.marginTop='8px';
  dhh.innerHTML='💾 <b>'+recCount+' leads with saved data on this computer</b> · last backup: <b>'+esc(lastex)+'</b>. Saves are instant, but hit <b>Export</b> at day’s end — a browser wipe can’t touch a downloaded backup.';
  if(lastex==='never'&&recCount>10){dhh.style.color='var(--red)';dhh.style.fontWeight='600';}
  help.appendChild(dhh);
  app.appendChild(help);
}

function exportData(){
  let padTxt='';try{padTxt=localStorage.getItem('pad_v1_'+LIST_ID)||'';}catch(e){}
  let tasksArr=[];try{tasksArr=JSON.parse(localStorage.getItem('tasks_v1_'+LIST_ID))||[];}catch(e){}
  const blob=new Blob([JSON.stringify({list:LIST_ID,exported:new Date().toISOString(),state:STATE,pad:padTxt,tasks:tasksArr},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='callstate-stfrancis-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  try{localStorage.setItem('lastexport_'+LIST_ID,String(Date.now()));}catch(e){}
  build();showToast('Backup downloaded');
}
function importData(file){
  const fr=new FileReader();fr.onload=()=>{try{const o=JSON.parse(fr.result);const st=o.state||o;if(typeof st!=='object')throw 0;
    let n=0;Object.keys(st).forEach(k=>{STATE[k]=Object.assign(rec(k),st[k]);n++;});
    if(typeof o.pad==='string'){try{localStorage.setItem('pad_v1_'+LIST_ID,o.pad);}catch(e){}}
    if(Array.isArray(o.tasks)){try{localStorage.setItem('tasks_v1_'+LIST_ID,JSON.stringify(o.tasks));TASKS=o.tasks;}catch(e){}}
    save();build();if(pad.classList.contains('show'))renderPad();showToast('Restored '+n+' leads');}catch(e){showToast('Bad backup file');}};
  fr.readAsText(file);
}

// ---- 30-min tap chips: [Today|Tomorrow|day] then [9a … 5:30p] — two taps, no pickers ----
function stampFor(baseDate,h,m){const d=new Date(baseDate);d.setHours(h,m,0,0);const p=n=>(n<10?'0':'')+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}
function tlabel(h,m){const ap=h<12?'a':'p';let hh=h%12;if(hh===0)hh=12;return hh+(m?':30':'')+ap;}
function dayChoices(){
  const out=[];const now=new Date();const names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let i=0;i<4;i++){const d=new Date(now);d.setDate(now.getDate()+i);out.push({lbl:i===0?'Today':(i===1?'Tomorrow':names[d.getDay()]),date:d,idx:i});}
  return out;
}
function chipTimePicker(opts){ // {onSet(stamp,label), onClear?, noTimeLbl?}
  const wrap=document.createElement('div');wrap.className='tpick';
  let dayIdx=0;const days=dayChoices();
  const dayRow=document.createElement('div');dayRow.className='nchips';
  const timeRow=document.createElement('div');timeRow.className='nchips';
  function renderDays(){
    dayRow.innerHTML='';
    days.forEach((d,i)=>{const b=document.createElement('button');b.className='nchip'+(i===dayIdx?' on':'');b.textContent=d.lbl;
      b.addEventListener('click',e=>{e.stopPropagation();dayIdx=i;renderDays();renderTimes();});dayRow.appendChild(b);});
    if(opts.noTimeLbl){const b=document.createElement('button');b.className='nchip';b.textContent=opts.noTimeLbl;
      b.addEventListener('click',e=>{e.stopPropagation();opts.onSet('','');});dayRow.appendChild(b);}
    if(opts.onClear){const b=document.createElement('button');b.className='nchip';b.textContent='✕ clear';
      b.addEventListener('click',e=>{e.stopPropagation();opts.onClear();});dayRow.appendChild(b);}
  }
  function renderTimes(){
    timeRow.innerHTML='';
    const now=new Date();
    for(let h=8;h<=17;h++)for(const m of [0,30]){
      if(dayIdx===0){const t=new Date();t.setHours(h,m,0,0);if(t<=now)continue;}
      const b=document.createElement('button');b.className='nchip tch';b.textContent=tlabel(h,m);
      b.addEventListener('click',e=>{e.stopPropagation();opts.onSet(stampFor(days[dayIdx].date,h,m),days[dayIdx].lbl+' '+tlabel(h,m));});
      timeRow.appendChild(b);
    }
    if(!timeRow.children.length){const s=document.createElement('span');s.className='sub2';s.textContent='Today’s hours are done — tap Tomorrow.';timeRow.appendChild(s);}
  }
  renderDays();renderTimes();
  wrap.appendChild(dayRow);wrap.appendChild(timeRow);
  return wrap;
}

function confetti(){
  const cols=['#34c759','#007aff','#ff9500','#af52de','#ff3b30','#30b0c7'];
  for(let i=0;i<26;i++){
    const s=document.createElement('i');s.className='cfx';
    s.style.left=(20+Math.random()*60)+'%';s.style.background=cols[i%cols.length];
    s.style.animationDelay=(Math.random()*.25)+'s';s.style.setProperty('--dx',((Math.random()*2-1)*160)+'px');
    document.body.appendChild(s);setTimeout(()=>s.remove(),1800);
  }
}

let dialOn=false;const SKIPPED=new Set();
const dialEl=document.createElement('div');dialEl.className='dial';document.body.appendChild(dialEl);
function dialQueue(){
  const term=q.value.trim().toLowerCase();
  const m=l=>{const r=STATE[l.dig];if(r&&r.status)return false;if(SKIPPED.has(l.dig))return false;if(nearOnly&&l.tier!==1)return false;if(chipCat&&l.c!==chipCat)return false;if(!term)return true;return (l.n+' '+l.c+' '+l.t).toLowerCase().includes(term);};
  const rows=[];CATS.forEach(cat=>{LEADS.filter(l=>l.c===cat).filter(m).slice().sort((a,b)=>a.mi-b.mi).forEach(l=>rows.push(l));});
  return rows;
}
function renderDial(){
  if(!dialOn){dialEl.classList.remove('show');return;}
  dialEl.classList.add('show');
  let today=0;LEADS.forEach(l=>{const r=STATE[l.dig];if(r&&isToday(r.ts))today++;});
  const qu=dialQueue();
  if(!qu.length){
    dialEl.innerHTML='<div class="dtop"><button class="dx">✕ Close</button><span>'+today+' / '+GOAL+' today</span><span></span></div><div class="dempty">🎉 Every lead in this view is handled.<br>Close, then clear a filter or pick another category.</div>';
    dialEl.querySelector('.dx').addEventListener('click',()=>{dialOn=false;renderDial();build();});
    return;
  }
  const l=qu[0],r=get(l.dig);
  dialEl.innerHTML='<div class="dtop"><button class="dx">✕ Close</button><span class="dleft"></span><button class="dskip">Skip ›</button></div>'+
    '<div class="dcard"><div class="dcat"></div><div class="dnm"></div><div class="dmeta"></div>'+
    '<button class="dnum"></button><div class="dhint">tap the number to copy → paste into the Salesforce dialer · always leave a VM</div>'+
    '<div class="dstat"></div><div class="dchips"></div><textarea class="dnotes" placeholder="What happened…"></textarea></div>';
  dialEl.querySelector('.dleft').textContent=qu.length+' to go · '+today+' / '+GOAL+' today';
  dialEl.querySelector('.dcat').textContent=l.c;
  dialEl.querySelector('.dnm').textContent=l.n;
  dialEl.querySelector('.dmeta').textContent=l.t+' · ~'+l.mi+' mi';
  const nb=dialEl.querySelector('.dnum');nb.textContent=l.p;
  nb.addEventListener('click',()=>{
    copyNum(l.p,{textContent:'',classList:{add(){},remove(){}}});
    const rr=rec(l.dig);rr.ts=Date.now();if(!rr.status)rr.status='called';save();
    let t2=0;LEADS.forEach(x=>{const rx=STATE[x.dig];if(rx&&isToday(rx.ts))t2++;});
    dialEl.querySelector('.dleft').textContent=qu.length+' to go · '+t2+' / '+GOAL+' today';
  });
  const stat=dialEl.querySelector('.dstat');
  ORDER.forEach(st=>{
    const b=document.createElement('button');b.className='sbtn';b.textContent=STATUS[st].g+' '+STATUS[st].lbl;
    b.addEventListener('click',()=>{
      if(st==='callback'){
        setStatus(l,'callback');
        const zone=dialEl.querySelector('.dchips');zone.innerHTML='';
        const h=document.createElement('div');h.className='sub2';h.textContent='↩ When do they want the call back?';zone.appendChild(h);
        zone.appendChild(chipTimePicker({noTimeLbl:'No time →',onSet:(s,lab)=>{if(s){rec(l.dig).time=s;showToast('↩ '+lab);}save();updatePadBadge();renderDial();}}));
      } else {setStatus(l,st);renderDial();}
    });
    stat.appendChild(b);
  });
  const ta=dialEl.querySelector('.dnotes');ta.value=r.notes||'';
  ta.addEventListener('input',()=>{rec(l.dig).notes=ta.value;clearTimeout(ta._t);ta._t=setTimeout(save,400);});
  dialEl.querySelector('.dchips').appendChild(chipRow(l,ta));
  dialEl.querySelector('.dskip').addEventListener('click',()=>{SKIPPED.add(l.dig);renderDial();});
  dialEl.querySelector('.dx').addEventListener('click',()=>{dialOn=false;renderDial();build();});
}

const pad=document.createElement('div');pad.className='pad';
pad.innerHTML='<div class="padhd"><b>📝 Notes & Tasks</b><button class="btn" id="padx">✕ Close</button></div>'+
 '<div class="ptabs"><button class="ptab on" data-t="tasks">📋 Tasks</button><button class="ptab" data-t="notes">🗒 Call notes</button><button class="ptab" data-t="paper">✏️ Paper</button></div>'+
 '<div class="pbody" id="pbody"></div>';
document.body.appendChild(pad);
let padTab='tasks';
pad.querySelectorAll('.ptab').forEach(b=>b.addEventListener('click',()=>{padTab=b.dataset.t;pad.querySelectorAll('.ptab').forEach(x=>x.classList.toggle('on',x===b));renderPad();}));
pad.querySelector('#padx').addEventListener('click',()=>pad.classList.remove('show'));
document.getElementById('padbtn').addEventListener('click',()=>{pad.classList.toggle('show');if(pad.classList.contains('show'))renderPad();});

function fmtDue(t){const d=new Date(t);if(isNaN(d))return t;return d.toLocaleString([],{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'});}
function copyBtnEl(p){const b=document.createElement('button');b.className='cp';b.textContent='Copy';b.addEventListener('click',e=>{e.stopPropagation();copyNum(p,b);});return b;}
function emptyMsg(m){const d=document.createElement('div');d.className='sub2';d.style.padding='20px 4px';d.textContent=m;return d;}

function renderPad(){
  const body=pad.querySelector('#pbody');body.innerHTML='';
  if(padTab==='paper'){
    const sub=document.createElement('div');sub.className='sub2';sub.textContent='Freeform — your big piece of paper. Saves automatically as you type.';
    const ta=document.createElement('textarea');ta.className='paper';
    try{ta.value=localStorage.getItem(PADKEY)||'';}catch(e){}
    ta.placeholder='Write anything…';
    ta.addEventListener('input',()=>{clearTimeout(ta._t);ta._t=setTimeout(()=>{try{localStorage.setItem(PADKEY,ta.value);flagSaved(false);}catch(e){flagSaved(true);}},400);});
    body.appendChild(sub);body.appendChild(ta);
    return;
  }
  if(padTab==='notes'){
    const sub=document.createElement('div');sub.className='sub2';sub.textContent='Everyone you’ve touched — status, notes, callbacks — newest first, business + number above each note. Edit a note here and it saves straight to that lead.';
    body.appendChild(sub);
    const rows=LEADS.filter(l=>{const r=STATE[l.dig];return r&&(r.notes||r.dm||r.email||r.status||r.time||r.ts);}).sort((a,b)=>(get(b.dig).ts||0)-(get(a.dig).ts||0));
    if(!rows.length){body.appendChild(emptyMsg('No calls logged yet. Every lead you mark or write a note on collects here.'));return;}
    rows.forEach(l=>{
      const r=get(l.dig);
      const c=document.createElement('div');c.className='pcard';
      const hd=document.createElement('div');hd.className='pchd';
      hd.innerHTML='<div class="pcnm"></div><div class="pcmeta"></div>';
      hd.querySelector('.pcnm').textContent=l.n;
      hd.querySelector('.pcmeta').textContent=l.t+' · '+l.p;
      if(r.status){const pl=document.createElement('span');pl.className='pill';pl.textContent=STATUS[r.status].lbl;pl.style.background=STATUS[r.status].c;hd.querySelector('.pcnm').appendChild(pl);}
      c.appendChild(hd);
      if(r.dm){const dm=document.createElement('div');dm.className='pcdm';dm.textContent='Ask for: '+r.dm;c.appendChild(dm);}
      if(r.time){const tm=document.createElement('div');tm.className='pctime'+(new Date(r.time)<=new Date()?' over':'');tm.textContent='↩ Call back '+fmtDue(r.time);c.appendChild(tm);}
      const ta=document.createElement('textarea');ta.className='pcnote';ta.value=r.notes||'';ta.placeholder='Note…';
      ta.addEventListener('input',()=>{rec(l.dig).notes=ta.value;clearTimeout(ta._t);ta._t=setTimeout(save,400);});
      c.appendChild(ta);
      const act=document.createElement('div');act.className='pcact';act.appendChild(copyBtnEl(l.p));c.appendChild(act);
      body.appendChild(c);
    });
    return;
  }
  // Tasks tab
  const sub=document.createElement('div');sub.className='sub2';sub.textContent='Callbacks pull in automatically from your leads. Add your own to-dos below. Red = overdue.';
  body.appendChild(sub);
  const form=document.createElement('div');form.className='taskform';
  form.innerHTML='<input type="text" id="ntxt" placeholder="New task… e.g. drop off rate card"><button class="btn on" id="nadd">Add</button>';
  body.appendChild(form);
  let ndue='';
  const tlbl=document.createElement('div');tlbl.className='sub2';tlbl.style.margin='2px 2px 0';tlbl.textContent='No reminder time — or tap one:';
  body.appendChild(tlbl);
  body.appendChild(chipTimePicker({noTimeLbl:'No time',onSet:(s,lab)=>{ndue=s;tlbl.textContent=s?('⏰ Reminder: '+lab):'No reminder time — or tap one:';}}));
  form.querySelector('#nadd').addEventListener('click',()=>{
    const t=form.querySelector('#ntxt').value.trim();if(!t)return;
    TASKS.push({id:Date.now()+''+Math.floor(Math.random()*1e4),txt:t,due:ndue||'',done:false,ts:Date.now()});
    saveTasks();renderPad();updatePadBadge();
  });
  const now=Date.now();
  const items=[];
  LEADS.forEach(l=>{const r=STATE[l.dig];if(r&&r.time){const d=new Date(r.time);items.push({kind:'cb',l,r,due:r.time,over:!isNaN(d)&&d.getTime()<=now,dt:isNaN(d)?Infinity:d.getTime()});}});
  LEADS.forEach(l=>{const r=STATE[l.dig];if(r&&r.status==='callback'&&!r.time){items.push({kind:'cbnt',l,r,due:'',over:false,dt:Infinity});}});
  TASKS.filter(t=>!t.done).forEach(t=>{const d=t.due?new Date(t.due):null;items.push({kind:'task',t,due:t.due,over:!!(d&&!isNaN(d)&&d.getTime()<=now),dt:(d&&!isNaN(d))?d.getTime():Infinity});});
  items.sort((a,b)=>(b.over-a.over)||(a.dt-b.dt));
  if(!items.length)body.appendChild(emptyMsg('Nothing pending. Set a "Call back at" time on a lead, or add a task above.'));
  items.forEach(it=>{
    const c=document.createElement('div');c.className='pcard task'+(it.over?' over':'');
    if(it.kind==='cb'){
      const hd=document.createElement('div');hd.className='pchd';
      hd.innerHTML='<div class="pcnm"></div><div class="pcmeta"></div>';
      hd.querySelector('.pcnm').textContent='📞 '+it.l.n;
      hd.querySelector('.pcmeta').textContent=it.l.t+' · '+it.l.p+(it.r.dm?' · ask for '+it.r.dm:'');
      c.appendChild(hd);
      const tm=document.createElement('div');tm.className='pctime'+(it.over?' over':'');tm.textContent=(it.over?'⚠ DUE — ':'')+'call back '+fmtDue(it.due);c.appendChild(tm);
      if(it.r.notes){const n=document.createElement('div');n.className='pcprev';n.textContent=it.r.notes;c.appendChild(n);}
      const act=document.createElement('div');act.className='pcact';
      act.appendChild(copyBtnEl(it.l.p));
      const dn=document.createElement('button');dn.className='btn';dn.textContent='✓ Done';
      dn.addEventListener('click',()=>{rec(it.l.dig).time='';save();build();renderPad();updatePadBadge();});
      act.appendChild(dn);c.appendChild(act);
    } else if(it.kind==='cbnt'){
      const hd=document.createElement('div');hd.className='pchd';
      hd.innerHTML='<div class="pcnm"></div><div class="pcmeta"></div>';
      hd.querySelector('.pcnm').textContent='📞 '+it.l.n;
      hd.querySelector('.pcmeta').textContent=it.l.t+' · '+it.l.p+(it.r.dm?' · ask for '+it.r.dm:'');
      c.appendChild(hd);
      const tm=document.createElement('div');tm.className='pctime';tm.textContent='↩ Callback — no time set. Tap when:';c.appendChild(tm);
      if(it.r.notes){const n=document.createElement('div');n.className='pcprev';n.textContent=it.r.notes;c.appendChild(n);}
      c.appendChild(chipTimePicker({onSet:(s,lab)=>{rec(it.l.dig).time=s;save();showToast('↩ '+lab);renderPad();updatePadBadge();}}));
      const act=document.createElement('div');act.className='pcact';
      act.appendChild(copyBtnEl(it.l.p));c.appendChild(act);
    } else {
      const hd=document.createElement('div');hd.className='pchd';
      hd.innerHTML='<div class="pcnm"></div>';hd.querySelector('.pcnm').textContent='☐ '+it.t.txt;c.appendChild(hd);
      if(it.due){const tm=document.createElement('div');tm.className='pctime'+(it.over?' over':'');tm.textContent=(it.over?'⚠ DUE — ':'')+fmtDue(it.due);c.appendChild(tm);}
      const act=document.createElement('div');act.className='pcact';
      const dn=document.createElement('button');dn.className='btn';dn.textContent='✓ Done';
      dn.addEventListener('click',()=>{it.t.done=true;saveTasks();renderPad();updatePadBadge();});
      const del=document.createElement('button');del.className='btn';del.textContent='✕';
      del.addEventListener('click',()=>{TASKS=TASKS.filter(x=>x.id!==it.t.id);saveTasks();renderPad();updatePadBadge();});
      act.appendChild(dn);act.appendChild(del);c.appendChild(act);
    }
    body.appendChild(c);
  });
  const doneT=TASKS.filter(t=>t.done);
  if(doneT.length){
    const dh=document.createElement('div');dh.className='sub2';dh.style.marginTop='14px';dh.textContent='Done';body.appendChild(dh);
    doneT.slice(-8).reverse().forEach(t=>{
      const c=document.createElement('div');c.className='pcard';
      c.innerHTML='<div class="pchd"><div class="pcnm" style="text-decoration:line-through;opacity:.55"></div></div>';
      c.querySelector('.pcnm').textContent='✓ '+t.txt;
      const del=document.createElement('button');del.className='btn';del.textContent='✕';del.style.marginTop='6px';
      del.addEventListener('click',()=>{TASKS=TASKS.filter(x=>x.id!==t.id);saveTasks();renderPad();});
      c.appendChild(del);
      body.appendChild(c);
    });
  }
}
function updatePadBadge(){
  const now=Date.now();let n=0;
  LEADS.forEach(l=>{const r=STATE[l.dig];if(r&&r.time){const d=new Date(r.time);if(!isNaN(d)&&d.getTime()<=now)n++;}});
  TASKS.forEach(t=>{if(!t.done&&t.due){const d=new Date(t.due);if(!isNaN(d)&&d.getTime()<=now)n++;}});
  const b=document.getElementById('padbadge');
  if(b){b.textContent=n;b.style.display=n?'inline-flex':'none';}
}
setInterval(()=>{updatePadBadge();if(pad.classList.contains('show')&&padTab==='tasks'&&!(document.activeElement&&pad.contains(document.activeElement)))renderPad();},60000);
updatePadBadge();

buildChips();
build();
</script>
</body>
</html>
